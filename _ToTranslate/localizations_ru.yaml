"storage/Items/w25tkt/Title": "Долгожданная посылка"
"storage/Items/w25tkt/Description": "Внутри — одна из праздничных Открыток.<br/><br/>• Обменяй Открытку на Почтовую марку в любой момент после получения или дождись новогоднего стрима. После него случайные шесть Открыток станут выигрышными и принесут их обладателям от 1 000 до 10 000 золота, а оставшиеся Открытки можно будет по-прежнему обменять на Почтовую марку.\n• Если же тебе посчастливилось заполучить Открытки 20 и 26, ждать стрима не нужно — 260 000 и 1 000 000 золота уже у тебя в кармане!"
"storage/Items/w25tkt_f/Title": "Блиц-посылка"
"storage/Items/w25tkt_f/Description": "Внутри — одна из праздничных Открыток.<br/><br/>• Обменяй Открытку на Почтовую марку в любой момент после получения или дождись новогоднего стрима. После него случайные шесть Открыток станут выигрышными и принесут их обладателям от 1 000 до 10 000 золота, а оставшиеся Открытки можно будет по-прежнему обменять на Почтовую марку.\n• Если же тебе посчастливилось заполучить Открытки 20 и 26, ждать стрима не нужно — 260 000 и 1 000 000 золота уже у тебя в кармане!"
"storage/Items/w25l1/Title": "Открытка 1"
"storage/Items/w25l1/Description": "Дорогой Дедушка Мороз!<br/><br/>В этом году я был хорошим танкистом: не АФК-шил, не подрезал своих и даже не пытался продать гараж в чате. Пришли, пожалуйста, побольше золота.<br/><br/>P.S. А правда, что эту Открытку можно обменять на Почтовую марку? Или лучше дождаться новогоднего стрима, чтобы узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли мне от 1 000 до 10 000 золота?"
"storage/Items/w25l2/Title": "Открытка 2"
"storage/Items/w25l2/Description": "Здравствуй, Дедушка Мороз,\nБорода из ваты!\nСнежные шары принёс —\nМы теперь богаты!<br/><br/>P.S. А правда, что эту Открытку можно обменять на Почтовую марку? Или лучше дождаться новогоднего стрима, чтобы узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли мне от 1 000 до 10 000 золота?"
"storage/Items/w25l3/Title": "Открытка 3"
"storage/Items/w25l3/Description": "И уносят меня, и уносят меня\nВ звенящую снежную даль\nТри бодрых коня, эх, три бодрых коня:\nБлоха, Суперконь и Шарльмань!<br/><br/>P.S. А правда, что эту Открытку можно обменять на Почтовую марку? Или лучше дождаться новогоднего стрима, чтобы узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли мне от 1 000 до 10 000 золота?"
"storage/Items/w25l4/Title": "Открытка 4"
"storage/Items/w25l4/Description": "С НГ!<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l5/Title": "Открытка 5"
"storage/Items/w25l5/Description": "Снег кружится, летает, летает,\nИ доспехами звеня,\nЗаметает Уран, заметает\nЧто осталось от Гриля...<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l6/Title": "Открытка 6"
"storage/Items/w25l6/Description": "С Новым годом поздравляют\nЭти снежные братки —\nЛедяные Великаны\nВсех поставят на катки.<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l7/Title": "Открытка 7"
"storage/Items/w25l7/Description": "Семь минут... Семь минут...\nСкоро бой пройдёт в рандоме.\nСемь минут... Семь минут...\nВся команда почти в сборе.\nСемь минут... Семь минут...\nНе задумывай плохого!\nПомни: в эти семь минут\nМожно сделать очень много...<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l8/Title": "Открытка 8"
"storage/Items/w25l8/Description": "С Новым годом, фанаты аниме!<br/><br/>Аниме на аватаре — здоровья всем в Ангаре! Кампай!<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l9/Title": "Открытка 9"
"storage/Items/w25l9/Description": "Дорогие тиммейты, с Новым годом!<br/><br/>Кабы не было тимы,\nВ этом нет секрета,\nБой тащить устали б мы,\nНадоело б это.\nЯ б урона не нанёс\nТыщи три хотя бы,\nНе помог бы Дед Мороз,\nКабы, кабы, кабы...<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l10/Title": "Открытка 10"
"storage/Items/w25l10/Description": "В Блице родилась Душенька,\nВ Блице она росла,\nИ много-много радости танкистам принесла.<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l11/Title": "Открытка 11"
"storage/Items/w25l11/Description": "Дорогие игроки, с наступающим!<br/><br/>Же-ла-ем,\nЧтоб вы все были здоровы\nИ чтобы над вами\nСияло солнце ярче, чем\nНа Кастилье и Канале!\nЧтоб вы до ста лет жили,\nИ чтоб горя не знали,\nИ чтоб обновы вас\nРа-до-ва-ли!<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l12/Title": "Открытка 12"
"storage/Items/w25l12/Description": "Просто невозможно ПТ-шки не любить,\nСнежную Бабаху выхожу лепить.\nМой любимый танчик! В этом есть резон:\nДаже Стужемётом нанесёт урон!<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l13/Title": "Открытка 13"
"storage/Items/w25l13/Description": "С Новым годом!<br/><br/>Пусть новогодний Снежный шар\nПодарит танк тебе в Ангар!\nПобольше золота в придачу,\nВ игре всегда ловить удачу!<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l14/Title": "Открытка 14"
"storage/Items/w25l14/Description": "С наступающим, танкист!<br/><br/>На тиммейтов в новом году надейся, а сам не плошай!<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l15/Title": "Открытка 15"
"storage/Items/w25l15/Description": "Поздравляем с Новым годом Лошади!<br/><br/>Пусть махнёт Лошадка гривой\nИ порадует тебя:\nЗолота даст, позитива\nИ ещё Суперконя!<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l16/Title": "Открытка 16"
"storage/Items/w25l16/Description": "С наступающим!<br/><br/>Ёлка наряжается,\nКоманда собирается.\nНовый год у ворот,\nВсех танкистов катка ждёт.<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l17/Title": "Открытка 17"
"storage/Items/w25l17/Description": "Удачного Нового года!<br/><br/>Затихнет всё и замрёт вокруг\nВ преддверии новых дней,\nИ обернётся сертификат\nМашиной в руке твоей.<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l18/Title": "Открытка 18"
"storage/Items/w25l18/Description": "Опять ивент,\nИ в праздничном Ангаре суета...\nОпять ивент,\nЯ скилл весь год качаю неспроста...<br/><br/>P.S. А правда, что эту Открытку можно обменять на Почтовую марку? Или лучше дождаться новогоднего стрима, чтобы узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли мне от 1 000 до 10 000 золота?"
"storage/Items/w25l19/Title": "Открытка 19"
"storage/Items/w25l19/Description": "С новым фрагом, с новым счастьем, статист!<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l20/Title": "Открытка 20"
"storage/Items/w25l20/Description": "И Новый год,\nЧто вот-вот настанет,\nИсполнил вмиг мечту твою...\n260 000 золота твоими стали,\nПрямо сейчас твоими стали.\nДа ты счастливчик, милый друг!\nДа ты счастливчик, милый друг!"
"storage/Items/w25l21/Title": "Открытка 21"
"storage/Items/w25l21/Description": "Сколько в Ларце у нас\nШариков цветных,\nСнеговичков да и\nШишек расписных!\nВыйдем мы в каточку\nВ дружный хоровод,\nВесело в Танчиках\nВстретим Новый год!<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l22/Title": "Открытка 22"
"storage/Items/w25l22/Description": "С Новым годом поздравляем!\nПусть удачным будет год —\nМного золота и танков\nВсем танкистам принесёт!<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l23/Title": "Открытка 23"
"storage/Items/w25l23/Description": "С наступающим!<br/><br/>Новый, новый, новый год\nВсе мечты исполнит!\nНовый, новый, новый танк\nКоллекцию пополнит!<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l24/Title": "Открытка 24"
"storage/Items/w25l24/Description": "Танчики, танки —\nБоёв аромат.\nВ скины нарядились\nИ встали все в ряд.\nПусть эти танчики\nВ праздничный час\nКаждым пробитием\nРадуют нас!<br/><br/>P.S. Говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l25/Title": "Открытка 25"
"storage/Items/w25l25/Description": "Говорят, под Новый год\nЧудеса случаются —\nСтатка резко вверх растёт,\nКатки не сливаются.\nРазвлеченьям нет границ,\nСбываются желания,\nНужно лишь в игре Tanks Blitz\nПриложить старания.<br/><br/>P.S. Ещё говорят, что эту Открытку можно обменять на Почтовую марку. А если дождёшься новогоднего стрима, то сможешь узнать, окажется ли Открытка в числе шести выигрышных и принесёт ли тебе от 1 000 до 10 000 золота."
"storage/Items/w25l26/Title": "Открытка 26"
"storage/Items/w25l26/Description": "Да это настоящее новогоднее голдовство!<br/><br/>Судя по всему, ты ооочень хорошо себя вёл в этом году, раз Дедушка Мороз принёс тебе целый 1 000 000 золота!<br/><br/>Поздравляем! Пусть и в новом году удача всегда будет на твоей стороне!"
"storage/Items/w25l26t/Obtainment": "Ищи в Блиц-посылке и Долгожданной посылке"
"storage/Items/chest_2025_SRR_QUEST_NOV/Title": "Сапфировый контейнер"
"storage/Items/chest_2025_SRR_QUEST_NOV/Description": "Гарантированно содержит:\n• контейнер из списка;\n• кредиты, свободный опыт или бустеры золота;\n• Талисман Алмазного контейнера.<br/><br/>Также может содержать:\n• ещё один контейнер из списка с вероятностью 25%;\n• кастомизацию из списка с вероятностью 20%;\n• Алмазный контейнер с вероятностью 5%;\n• танк из списка с вероятностью 3%."
"storage/Items/stuffQuest_2025_SRR_NOV/Title": "Квест «Во всю мощь»"
"storage/Items/stuffQuest_2025_SRR_NOV/Description": "Нанеси 270 000 ед. урона"
"storage/Items/chest_wnova_cd2/Description": "С вероятностью 20% содержит Талисман контейнера «Тёмная материя I» и Контейнер с золотом.<br/><br/>Если эти награды не выпадают из контейнера, ты гарантированно получишь от 1 000 до 200 000 золота, контейнеры «Ледяная галактика III», «Просто космос» и «Собери их все!».\nДополнительно можно получить аватар «Жемчужная туманность».<br/><br/>Контейнер также может содержать Танкоин с вероятностью 0,01%."
"storage/Items/chest_wnova_cd2/Features": "Чем выше уровень контейнера, тем круче награды!"
"storage/Items/chest_wnova_cd2/Title": "Контейнер «Ледяная галактика II»"
