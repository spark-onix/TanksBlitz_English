"TankMechanics/GunCoolingDescription": "• Если немного подождать после перезарядки орудия, можно повысить урон от следующего выстрела и ускорить перезарядку после него.\n• Процесс остывания орудия отображается на специальной шкале с обеих сторон прицела.\n• Чтобы получить максимальный бонус, нужно дождаться полного остывания орудия."
"TankMechanics/TwinGuns": "Спаренные орудия"
"TankMechanics/TwinGunsDescription": "• У орудий есть два режима стрельбы (одиночный и дуплет), которые переключаются нажатием на кнопку.\n• В одиночном режиме орудия ведут огонь попеременно, а их перезарядка происходит независимо друг от друга.\n• Для выстрела дуплетом перезарядка должна быть завершена у обоих орудий.\n• Маркеры на прицеле привязаны к каждому из орудий, меняя своё положение в зависимости от дистанции."
