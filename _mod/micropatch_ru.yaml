"hangar/battleType/scuffleDescription": "Проверь своё мастерство в бою без привычных подсказок в условиях, максимально приближенных к реальным!\n\nОсобенности:\n• У бронепробиваемости и урона нет разброса, и они всегда равны своим средним значениям.\n• Отсутствует обводка танков противника, а также подсветка их брони в снайперском режиме.\n• Полоска прочности, а также другие маркеры и иконки над противником не отображаются, но на вражескую технику всё ещё можно ставить метки через быстрые команды.\n• Танки противника не отображаются на миникарте, но они заметны на любой дистанции, если не скрыты препятствиями.\n• Вместо вида от третьего лица используется командирская камера: обзор ведётся прямо над корпусом танка.\n• Вся растительность на картах становится непрозрачной.\n• Лампочка не загорается, если твой танк обнаружен противником.\n• Сражения разворачиваются на специально подобранных картах и только на исторических танках.\n• Перед боем с техники снимается обвес и устанавливается реалистичный камуфляж.\n• Бои проходят по правилам Превосходства и не учитываются в статистике."
"TankMechanics/ATGMDescription": "• Выпущенным снарядом можно управлять при помощи камеры или прицела\n• На танке можно играть только в фановых режимах (во всех, кроме Столкновения и Реалистичного боя)"
