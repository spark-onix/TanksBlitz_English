"storage/Items/s25l6/Description": "Твой французик в запаре,\nИ башни горят.\nТебе сделали больно,\nТы покинул Бачат<br/><br/>Этот хит принесёт тебе от 500 до 10 000 золота. Сколько — определим в прямом эфире, следи за новостями!"
