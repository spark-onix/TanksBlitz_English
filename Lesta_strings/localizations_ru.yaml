"storage/Items/m_b_3l/Title": "Мистический контейнер III"
"storage/Items/m_b_3l/Description": "• Гарантированно содержит Талисман Мистического контейнера III и сертификаты на свободный опыт и бонус опыта.\n• Также содержит случайную награду из списка, которой с вероятностью 15% может быть Мистический сертификат."
