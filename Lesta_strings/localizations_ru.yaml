"storage/Items/Halloween2021Chest/Description": "Содержит один танк из списка с вероятностью 5% или случайные награды:\n• Легендарный аватар с вероятностью 8%.\n• Сертификат на легендарный камуфляж или Сертификат на обвес с вероятностью 12%.\n• Золото с вероятностью 25%.\n\nС каждым открытием контейнера вы гарантированно получаете 4 награды: Сертификаты на свободный опыт, бустеры, дни премиум аккаунта и 1 Талисман золота."
