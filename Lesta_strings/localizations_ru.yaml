"storage/Items/m_b_2l/Description": "• Гарантированно содержит Талисман Мистического контейнера III и сертификаты на свободный опыт и бонус опыта.\n• Также содержит случайную награду из списка, которой с вероятностью 8% может быть Мистический контейнер III, а с вероятностью 10% — Мистический сертификат."
