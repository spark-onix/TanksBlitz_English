"storage/Items/s25l8/Description": "Я на семёрке ПТ.\nЭто как шестёрка, но на один повыше<br/><br/>Этот хит принесёт тебе от 500 до 10 000 золота. Сколько — определим в прямом эфире, следи за новостями!"
