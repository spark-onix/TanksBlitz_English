"storage/Items/s25l1/Title": "Трек 1"
"storage/Items/s25l10/Description": "Моя игра, моя игра\nОна очень хороша, но мне так нужна голда…<br/><br/>Этот хит принесёт тебе от 500 до 10 000 золота. Сколько — определим в прямом эфире, следи за новостями!"
"storage/Items/s25l10/Title": "Трек 10"
"storage/Items/s25l11/Description": "Все танкуют бортами,\nВсе танкуют бортами<br/><br/>Этот хит принесёт тебе от 500 до 10 000 золота. Сколько — определим в прямом эфире, следи за новостями!"
"storage/Items/s25l11/Title": "Трек 11"
"storage/Items/s25l12/Description": "Неизвестен — Без названия<br/><br/>Золотой хит! Забирай 1 000 000 золота, счастливчик!"
"storage/Items/s25l12/Title": "Трек 12"
"storage/Items/s25l13/Description": "Ма-ро-дёр\nТы меня называлааа<br/><br/>Этот хит принесёт тебе от 500 до 10 000 золота. Сколько — определим в прямом эфире, следи за новостями!"
"storage/Items/s25l13/Title": "Трек 13"
"storage/Items/s25l14/Description": "Просто такая сильная броня, ты ещё не знаешь<br/><br/>Этот хит принесёт тебе от 500 до 10 000 золота. Сколько — определим в прямом эфире, следи за новостями!"
"storage/Items/s25l14/Title": "Трек 14"
"storage/Items/s25l15/Description": "Уходим, уходим, уходим\nКомпенс за танк две тыщи<br/><br/>Этот хит принесёт тебе от 500 до 10 000 золота. Сколько — определим в прямом эфире, следи за новостями!"
"storage/Items/s25l15/Title": "Трек 15"
