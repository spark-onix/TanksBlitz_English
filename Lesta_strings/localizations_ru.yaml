"storage/Items/s25l3/Title": "Трек 3"
"storage/Items/s25l4/Description": "Шарлемань, парнишка симпатичный!<br/><br/>Этот хит принесёт тебе от 500 до 10 000 золота. Сколько — определим в прямом эфире, следи за новостями!"
