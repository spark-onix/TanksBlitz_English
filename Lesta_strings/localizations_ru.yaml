"storage/Items/s26tkt/Description": "Внутри — один из шестнадцати Фонариков.<br/><br/>• Обменяй Фонарики с 1 по 14 номер на Флаер в любой момент после получения или дождись стрима «Событие на миллион». После эфира три случайных Фонарика станут выигрышными и принесут их обладателям от 2 000 до 10 000 золота.\n• Фонарик 15 принесёт тебе 1 000 000 золота сразу, а обладатели Фонарика 16 поучаствуют в суперигре с общим призовым фондом в 1 000 000 российских рублей.\nПокупаешь контейнер — соглашаешься на участие в акции."
