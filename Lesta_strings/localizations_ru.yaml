"storage/Items/ambt_chest/Title": "XL Контейнер AMBT"
"storage/Items/ambt_chest/Description": "Гарантированно содержит 5 наград:\n• бустеры;\n• Талисман XL Контейнера AMBT;\n• бустеры золота;\n• сертификаты на свободный опыт;\n• сертификаты на бонус опыта.\nТакже содержит награды из списка:\n• контейнер «Последние новинки» с вероятностью 3%;\n• средний премиум танк VIII уровня AMBT с вероятностью 5% или случайный танк из списка с вероятностью 3,5%;\n• легендарный камуфляж «Саламандра» для AMBT с вероятностью 6%;\n• золото с вероятностью 50%."
"storage/Items/ambt_chest_v2/Title": "Контейнер AMBT"
"storage/Items/ambt_chest_v2/Description": "Гарантированно содержит 4 награды:\n• бустеры;\n• Талисман XL Контейнера AMBT;\n• сертификаты на свободный опыт;\n• сертификаты на бонус опыта.\nТакже содержит награды из списка:\n• контейнер «Последние новинки» с вероятностью 1%;\n• средний премиум танк VIII уровня AMBT с вероятностью 3%;\n• золото с вероятностью 20%;\n• бустеры золота с вероятностью 50%."
"storage/Items/ambt_chest_token/Features": "• Выпадает с каждым открытием контейнера.\n• Собрав 10 Талисманов, ты получишь XL Контейнер AMBT."
