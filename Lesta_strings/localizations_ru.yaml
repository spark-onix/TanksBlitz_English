"storage/Items/s26l16/Title": "Фонарик 16"
"storage/Items/s26l16/Description": "Случайности не случайны. Мудрецы говорят, что тебе повезло вдвойне<br/><br/>• Этот Фонарик даёт возможность поучаствовать в суперигре с общим призовым фондом в 1 000 000 российских рублей. Судьба решится на стриме «Событие на миллион», следи за новостями!\n• После эфира сможешь обменять Фонарик на Мистификат, чтобы получить танк VI–X уровней, которого у тебя нет в Ангаре."
