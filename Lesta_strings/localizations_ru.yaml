"storage/Items/m_b_1l/Description": "Гарантированно содержит:\n• Талисман Мистического контейнера II;\n• сертификаты на свободный опыт и бонус опыта.<br/><br/>Также может содержать:\n• свободный опыт с вероятностью 33%;\n• золото с вероятностью 24%;\n• кредиты с вероятностью 15%;\n• дни премиум аккаунта с вероятностью 10%;\n• Мистический контейнер II с вероятностью 8%;\n• Мистический сертификат с вероятностью 5%;\n• Мистический контейнер III с вероятностью 3%;\n• аватар из списка с вероятностью 3%;\n• Танкоин с вероятностью 0,01%."
