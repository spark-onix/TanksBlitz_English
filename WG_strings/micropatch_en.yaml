"2026-big-forge-str-freexp-chest_descr": "Opens with Free XP.\nIncludes these rewards:\n• 1 type of Booster (Combat XP, Free XP, Crew XP, Credit)\n• 1–10 Valor Tokens\n• 1 Upgrade Material\nMay also include these rewards:\n• 1 Tier V–IX tank from the list with a 1% drop chance\n• 1 Legendary camouflage from the list with a 3% drop chance"
"2026-big-forge-str-free-prx-chest_descr": "Opens with Valor Tokens.\nIncludes 1 type of Booster (Combat XP, Crew XP, Credit, Cooldown Boosters).\nMay also include these rewards:\n• 1 Upgrade Material with a 15% drop chance\n• 1 Legendary camouflage from the list with a 1% drop chance"
"2026-big-forge-str-gold-chest_descr": "Opens with Gold.\nIncludes 1 Axe with a 5% drop chance.\nOR\nIncludes these guaranteed rewards with a 95% drop chance:\n• 1 Rare Certificate for Free XP\n• 3 Common Certificates for Free XP\n• 1 type of Booster (Combat XP, Free XP, Crew XP, Credit)\n• 2–15 Valor Tokens\n• 2 Upgrade Materials\nAlong with the guaranteed rewards, may also include 1 Tier VII–IX tank from the list with a 4.75% drop chance and 1 Legendary camouflage from the list with a 9.5% drop chance."
"2026-big-forge-str-air-chest_descr": "Opens with an Axe. Can also be purchased in the Store. The Axes can be found in the Golden Containers.\nIncludes these rewards:\n• 1 Tier IX–X tank from the list\n• 5–20 Valor Tokens\n• 5 Upgrade Materials\nMay also include 1 Legendary camouflage from the list with a 20% drop chance."
