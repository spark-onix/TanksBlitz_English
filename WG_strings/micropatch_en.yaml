"hangar/battleType/totalGameModeHeader": "TOTAL DOMINATION"
"hangar/battleType/totalGameModeShortDescription": "Tier I–X tanks meet in one field. Take control of the rapidly changing bases with your team strategy and maneuver!"
"battleType/total_game_mode": "Total Domination"
"hangar/battleType/total_game_modeDescription": "To win, be the first to earn 1,000 victory points or obtain more victory points than the enemy team before time’s up. Respawn is infinite. There is no armor highlighting.\nYou can join this Battle Mode using any tanks of any Tier. All the tanks are rebalanced based on the average characteristics of Tier X tanks of each tank type. The matchmaker balances the tank types involved in each team as usual.\nBattles last 7 minutes, and don't affect your stats.\n\nCapture Random Bases:\n• Capture and defend active bases on the map to earn victory points. Quick action is required to capture each Base.\n• If both ally and enemy tanks are present inside the captured Base's circle, the Base's owner will only earn 30% of the victory points.\n• The active Bases appear on the map one after another randomly.\n• Before the next Base activates, a lock icon will appear indicating its position on the minimap first. You can start capturing the Base after the lock icon disappears.\n• When a new Base activates, it’s chosen among the Bases that haven’t activated yet. If all Bases on the map have already activated once, a new Base rotation starts.\n• Keep your eyes on the minimap to respond swiftly to changes. Remember the first active Base appears in the center of the map.\n\nRepel Enemies:\n• Prevent the enemy team from capturing active Bases by damaging their tanks inside the Base circle.\n• Recapture the active bases that were previously captured by the enemy team.\n• Destroy enemy tanks to reduce the enemy team's victory points. They lose 25 victory points each time you destroy one of their tanks.\n\nAdditional Features:\n• If your team's victory points are significantly lower than the enemy team's victory points, your team's tanks will respawn faster than before."
"#arenas:type/totalGameMode/description": "Objective: capture bases and be the first team to score 1,000 victory points."
"2026-BIG-FORGE/header": "No Man's Land"
"2026-big-forge-str-entrance_title": "HQ"
"2026-big-forge-str-freeprx_title": "Soldier's Trail"
"2026-big-forge-str-energypump_title": "Maintenance Depot"
"2026-big-forge-str-tank_title": "Prowler"
"2026-big-forge-str-freexp-chest_title": "Free XP Container"
"2026-big-forge-str-free-prx-chest_title": "Valor Container"
"2026-big-forge-str-gold-chest_title": "Golden Container"
"2026-big-forge-str-gold_title": "Mercenary's Trail"
"2026-big-forge-str-trainyard_title": "Gunning Field"
"2026-big-forge-str-air-chest_title": "Airdrop Container"
"2026-BIG-FORGE/currency/win/terms": "• Get 1 Valor Token for each victory in Tier IV–X tanks.\n• Tournament battles won't provide Valor Tokens.\n• Upgrade the Gunning Field to receive additional Valor Tokens for any Mastery Badge earned in a battle.\n• Upgrade the Maintenance Depot to receive additional Valor Tokens upon a daily login.\n• To get Valor Tokens for victories, you need to earn enough Combat XP (without multipliers):<br/><br/>%(drop)"
"2026-big-forge-str-energypump_descr": "Generates Valor Tokens per 24h. Receive Valor Tokens by entering the game every day!\nBuild the Maintenance Depot with Credits. Find Upgrade Materials among the steps and Containers, and use them to upgrade the Maintenance Depot. The higher levels of the Maintenance Depot generate more Valor Tokens."
"2026-big-forge-str-free-reward-100_title": "Trailhead"
"2026-big-forge-str-free-reward-100_descr": "Danger, secrets, and your target—the Prowler—lurk in the mist. Choose a trail and follow it. There’s no time to lose.\n• Soldier's Trail: Use Valor Tokens to progress through this Trail. Earn them by winning battles.\n• Mercenary's Trail: Use Gold to progress through this Trail for even bigger rewards.\nClaim the Upgrade Material for free here. Use it to enrich the Maintenance Depot and Gunning Field."
"2026-big-forge-str-freeprx_descr": "The winding Soldier’s Trail will test your mettle. Persevere, follow your instincts, and you’re bound to succeed.\nUse Valor Tokens to claim the reward. To earn Valor Tokens, win battles using Tier IV–X tanks."
"2026-big-forge-str-freeprx-106_title": "Side-Tracked"
"2026-big-forge-str-freeprx-106_descr": "A dead end...with a fortified tent! Hidden among the sandbags is a makeshift kitchen. You find a full Mess Kit, clean as a whistle.\nUse Valor Tokens to claim the reward."
"2026-big-forge-str-quest-campfire-1_title": "Campfire Quest #1"
"2026-big-forge-str-quest-campfire-1_descr": "A cozy campfire burns against a battle-torn vista. Take a load off. Relax. Maybe find a bite to eat...\nAfter claiming the Quest, find it in Storage, start the timer, and complete the Quest to receive the General's Mackerel #1."
"2026-big-forge-str-quest-campfire-1-reward_title": "Nutrient Delivery"
"2026-big-forge-str-quest-campfire-1-reward_descr": "Doesn't look like much, but to a soldier...it’s a rare delicacy. Which means it's worth something down in the trenches.\nExchange the General's Mackerel #1 for the reward."
"2026-big-forge-str-quest-campfire-2_title": "Campfire Quest #2"
"2026-big-forge-str-quest-campfire-2_descr": "Gunfire echoes in the distance, but this camp looks safe. You could rustle up some food, if you're careful.\nAfter claiming the Quest, find it in Storage, start the timer, and complete the Quest to receive the General's Mackerel #2."
"2026-big-forge-str-quest-campfire-2-reward_title": "Honest Trade"
"2026-big-forge-str-quest-campfire-2-reward_descr": "You find someone craving this exact morsel. Better consider their trade offer.\nExchange General's Mackerel #2 for the Upgrade Material. Use it to enrich the Maintenance Depot and Gunning Field."
"2026-big-forge-str-quest-campfire-3_title": "Campfire Quest #3"
"2026-big-forge-str-quest-campfire-3_descr": "The glow of a humble campfire draws you in. You rest, count your ammo, and feel your stomach growl. Time to hunt for food.\nAfter claiming the Quest, find it in Storage, start the timer, and complete the Quest to receive the General's Mackerel #3."
"2026-big-forge-str-quest-campfire-3-reward_title": "Under the Duster"
"2026-big-forge-str-quest-campfire-3-reward_descr": "A lone merc opens his duster, flashing a bundle of Credits. He nods at your can of fish. Seems he’s looking to trade.\nExchange General's Mackerel #3 for the reward."
"2026-big-forge-str-freeprx-1190_title": "Winding Trenches"
"2026-big-forge-str-freeprx-1190_descr": "The deep trench maze is full of debris, but you see something sparkling down this path. Could be valuable...\nUse Valor Tokens to claim the reward and continue your way."
"2026-big-forge-str-freeprx-1200_title": "Winding Trenches"
"2026-big-forge-str-freeprx-1200_descr": "You survey the rugged trenches. The path ahead is smooth and dry, and your instincts say to follow it...\nUse Valor Tokens to claim the reward and continue your way."
"2026-big-forge-str-freeprx-1210_title": "Winding Trenches"
"2026-big-forge-str-freeprx-1210_descr": "This path through the trenches is waterlogged and full of shell casings. Rewards don't come to the faint of heart, as they say...\nUse Valor Tokens to claim the reward and continue your way."
"2026-big-forge-str-freeprx-1220_title": "In the Trenches"
"2026-big-forge-str-freeprx-1220_descr": "Mud under your boots, gunfire in the distance. Each direction looks the same. Which turn leads forward, and which leads nowhere?\nUse Valor Tokens to claim the reward."
"2026-big-forge-str-freeprx-1230_title": "In the Trenches"
"2026-big-forge-str-freeprx-1230_descr": "Another turn. Smoke drifts overhead, and the crack of gunfire rattles the dirt. Will you find a way out, or walk straight into the unknown?\nUse Valor Tokens to claim the reward."
"2026-big-forge-str-freeprx-1240_title": "In the Trenches"
"2026-big-forge-str-freeprx-1240_descr": "The trench walls rise high with sandbags and splintered planks. You can’t see beyond the next bend. Every step forward is a leap into the unseen.\nUse Valor Tokens to claim the reward."
"2026-big-forge-str-freeprx-1250_title": "In the Trenches"
"2026-big-forge-str-freeprx-1250_descr": "The maze tightens again. Smoke drifts low, muffling the thunder of battle. Will this be a dead end, or the way through?\nUse Valor Tokens to claim the reward."
"2026-big-forge-str-freeprx-1260_title": "In the Trenches"
"2026-big-forge-str-freeprx-1260_descr": "There is no clear path, no safe direction. Only the courage to keep going, no matter what lies ahead.\nUse Valor Tokens to claim the reward."
"2026-big-forge-str-freeprx-1270_title": "In the Trenches"
"2026-big-forge-str-freeprx-1270_descr": "It feels like you’ve been crawling through these trenches forever. The walls never change, the turns never end. Is there even a way out?\nUse Valor Tokens to claim the reward."
"2026-big-forge-str-freeprx-1280_title": "Unexpected Discovery"
"2026-big-forge-str-freeprx-1280_descr": "Finally! The maze releases you into a ruined alcove. In the center lies a weathered soldier’s duffel bag, stuffed with supplies—your well-deserved reward.\nUse Valor Tokens to claim the reward."
"2026-big-forge-str-freeprx-1380_title": "Off the Beaten Path"
"2026-big-forge-str-freeprx-1380_descr": "The battlefield’s chaos made you lose track of the path. Might as well call it a “detour” and explore a little.\nUse Valor Tokens to claim the reward and continue your way."
"2026-big-forge-str-freeprx-1410_title": "Wanderlust"
"2026-big-forge-str-freeprx-1410_descr": "You wander for what feels like hours, deep into the woods. A trip to nowhere. At least you find a basket of fresh mushrooms — they'll make a good soup.\nUse Valor Tokens to claim the reward."
"2026-big-forge-str-freeprx-147_title": "Off-Road Expedition"
"2026-big-forge-str-freeprx-147_descr": "You carefully explore caves and groves in the forest. There must be something interesting nearby. Maybe the Firewatch Tower on the horizon holds a clue?\nUse Valor Tokens to claim the reward."
"2026-big-forge-str-quest-tower_title": "Firewatch Tower Quest"
"2026-big-forge-str-quest-tower_descr": "You find an old campsite. Someone’s lunch sits half-eaten on a table. The trees are riddled with bullet holes, as if the camp was attacked. You ready your weapon and look around...\nAfter claiming the Quest, find it in Storage, start the timer, and complete the Quest to find the Firewatcher's Locket."
"2026-big-forge-str-cabin_title": "Firewatcher's Cabin"
"2026-big-forge-str-cabin_descr": "The local Firewatcher lives here. After graciously feeding you a hot meal, he begins to cry. He recently lost a keepsake near the Firewatch Tower—a reminder of his best friend. Maybe you could retrieve it?\nFind the Firewatcher's lost keepsake and give it back to him."
"2026-big-forge-str-trainyard_descr": "Allows you to receive additional Valor Tokens for Mastery Badge earned in a battle.\nBuild the Gunning Field with Credits. Find Upgrade Materials among the steps and Containers, and use them to upgrade the Gunning Field. The higher levels of the Gunning Field earn you more Valor Tokens."
"2026-big-forge-str-tank_descr": "This is your final goal—the Prowler. With this one machine, you can take over No Man's Land once and for all.\nProgress through the Soldier's or Mercenary's Trail to reach this step."
"2026-big-forge-str-freeprx-upgrade_descr": "Use Valor Tokens to claim the Upgrade Material. Enrich the Maintenance Depot and Gunning Field with the Upgrade Material."
"2026-big-forge-str-entrance_descr": "HQ is the last bastion of safety. Danger grows the farther you venture. Pack your supplies, and be ready for anything.\nBuild the HQ and continue your way."
