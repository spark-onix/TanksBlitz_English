"storage/Items/prx_progress_chest_J38_Type_95_Ji_Ro/Description": "Currency to obtain the Type 95 Ji-Ro, a Tier VIII Collector tank destroyer. Collecting enough currency triggers guaranteed drop of the tank destroyer from the Type 95 Ji-Ro Container."
