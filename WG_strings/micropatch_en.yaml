"storage/Items/prx_progress_chest_Type_95_Ji_Ro_friends/Title": "Ji-Ro and Comrades Charm"
"storage/Items/prx_progress_chest_Type_95_Ji_Ro_friends/Description": "Collecting enough currency triggers a guaranteed drop of one of these rewards: the Type 95 Ji-Ro, Nemesis, Type 63, or the Sentinelle."
"storage/Items/J38_Type_95_Ji_Ro_EXT_chest/Description": "Includes the Type 95 Ji-Ro, a Tier VIII Collector tank destroyer, with a 5% drop chance.\nOR\nIncludes these resources with a 95% drop chance:\n• 1 Type 95 Ji-Ro Charm\n• 3 different rarity types of Boosters from among Combat XP, Free XP, Crew XP, Credit, Cooldown, and Gold Boosters\n• 1–3 Certificates for XP Bonus\n• 20,000–150,000 Credits\nAlong with the resources, may also include 100–1,000 Gold with a 28.5% drop chance or 1–3 Common Certificates for Free XP with a 66.5% drop chance."
"storage/Items/J38_Type_95_Ji_Ro_INT_tanks/Description": "Includes one of these Tier VIII tanks with a 5% drop chance:\n• Type 95 Ji-Ro, a Collector tank destroyer\n• Nemesis, a Collector medium tank\n• Type 63, a Collector heavy tank\n• Sentinelle, a Collector heavy tank\nOR\nIncludes these resources with a 95% drop chance:\n• 1 Ji-Ro and Comrades Charm\n• 3 different rarity types of Boosters from among Combat XP, Free XP, Crew XP, Credit, Cooldown, and Gold Boosters\n• 1–3 Certificates for XP Bonus\n• 1–3 Common Certificates for Free XP\n• 70,000–190,000 Credits\nYou won't receive the same tank again from the Ji-Ro and Comrades Container until all tanks have been ruled-out."
"storage/Items/Oth92_JagdPantherII_Titan_chest/Title": "Titan JPanther II Container"
"storage/Items/Oth92_JagdPantherII_Titan_chest/Description": "Includes the Titan JPanther II, a Tier VIII Collector tank destroyer, with a 5% drop chance.\nOR\nIncludes these resources with a 95% drop chance:\n• 1 Titan JPanther II Charm\n• 3 different rarity types of Boosters from among Combat XP, Free XP, Crew XP, Credit, and Cooldown Boosters\n• 1–3 Certificates for XP Bonus\n• 20,000–150,000 Credits\nAlong with the resources, may also include 100–1,000 Gold with a 28.5% drop chance or 1–3 Common Certificates for Free XP with a 66.5% drop chance."
"storage/Items/prx_progress_chest_Oth92_JagdPantherII_Titan/Title": "Titan JPanther II Charm"
