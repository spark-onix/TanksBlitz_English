"storage/Items/chest_2026_flea_2/Description": "Includes these rewards:\n• 5–200 Metal Buttons\n• 1 Fixed Up Garage Charm\n• 1–3 of one type of the Containers from the list\n• 500–100,000 Gold\n• 1,000–100,000 Free XP\nAND\nMay also include these rewards:\n• 1 tank from the list with a 6% drop chance\n• Iron Heartbeat Animated Avatar with a 1% drop chance\n• Convoyer Profile Background with a 0.1% drop chance\n• 1 Legendary camouflage from the list with an 8% drop chance\n• 1–20 Certificates for XP Bonus with a 50% drop chance\nYou won't receive the same tank again from the Fixed Up Garage until all tanks have been ruled-out."
