"hangar/battleType/scuffleDescription": "Test your skills in combat without the usual assists under conditions that are as close to reality as possible!\n\nFeatures:\n• Armor penetration and damage have no dispersion and are always equal to their average values.\n• Enemy vehicle outlines and armor highlighting in sniper mode are disabled.\n• Hitpoint bars, markers, and icons above enemies are not displayed, but enemy vehicles can still be marked via quick commands.\n• Enemy vehicles are not displayed on the minimap, but they are visible at any distance if not hidden by obstacles.\n• A commander's camera is used instead of the third-person view: the view is conducted directly above the hull of the tank.\n• All foliage on maps becomes opaque.\n• The Sixth Sense light bulb does not activate when your vehicle is spotted by the enemy.\n• Battles take place on specially selected maps and only on historical tanks.\n• Attachments are removed from vehicles and realistic camouflage is applied before battle.\n• Battles follow Supremacy rules and are not recorded in stats."
"TankMechanics/ATGMDescription": "• The fired missile can be controlled using the camera or reticle\n• The vehicle can only be played in fun modes (all except Skirmish and Realistic Battle)"
